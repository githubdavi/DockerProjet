services:
  database:
    container_name: mongodb
    user: 999:999
    image: mongo
    ports:
      - 27017:27017
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      target: dev
    user: 1500:1500
    env_file: ./frontend/.env.dev
    ports:
      - 8080:8080

  auth-service:
    container_name: auth-service
    build:
      context: ./services/auth-service
      target: dev
    user: 1501:1501
    env_file: ./services/auth-service/.env.dev
    ports:
      - 3001:3001
    depends_on:
      database:
        condition: service_healthy

  product-service:
    container_name: product-service
    build:
      context: ./services/product-service
      target: dev
    user: 1503:1503
    env_file: ./services/product-service/.env.dev
    ports:
      - 3000:3000
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-service:
    container_name: order-service
    build:
      context: ./services/order-service
      target: dev
    user: 1502:1502
    env_file: ./services/order-service/.env.dev
    ports:
      - 3002:3002
    depends_on:
      product-service:
        condition: service_healthy

  init-products:
    build:
      context: .
      dockerfile: ./Dockerfile-init-products
    user: 1504:1504
    env_file: ./.env.development
    ports:
      - 3004:3004
    depends_on:
      product-service:
        condition: service_healthy
