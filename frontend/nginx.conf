server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Toutes les routes du frontend
    location / {
        try_files $uri /index.html;
    }

    # Proxy pour auth-service
    location /api/auth/ {
        proxy_pass http://auth-service:3001/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy pour product-service
    location /api/product/ {
        proxy_pass http://product-service:3000/api/product/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # # Proxy pour order-service (si tu le mets plus tard)
    # location /api/order/ {
    #     proxy_pass http://order-service:3002/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }
}