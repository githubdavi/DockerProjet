name: E-Commerce Application tests

on:
  workflow_call:
  push:
    feature/order-service:
    main:
  pull_request:
    main:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18

      - name: Trimming line breaks
        run: sed -i 's/\r$//' ./scripts/run-tests.sh

      - name: Updating apt-get and installing depencencies
        run: sudo apt-get update -y && sudo apt-get install libcurl4 -y

      - name: Run ls
        run: ls

      - name: Installing dependencies
        run: sudo ./scripts/run-tests.sh
